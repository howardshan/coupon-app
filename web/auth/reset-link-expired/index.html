<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link expired — Crunchy Plum</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 16px;
    }
    p {
      color: #666;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .hint {
      color: #aaa;
      font-size: 12px;
      line-height: 1.5;
      margin-top: 8px;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo" aria-hidden="true">🍑</div>
    <h1>This link has expired</h1>
    <p>This reset link was already used or is no longer valid. Open the <strong>Crunchy Plum</strong> app, tap <strong>Forgot password</strong>, and request a new email.</p>
    <p class="hint">If you did not request a password reset, you can ignore this message.</p>
  </div>
</body>
</html>
