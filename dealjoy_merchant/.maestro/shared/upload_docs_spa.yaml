# Spa & Massage 分类：上传6个证件
appId: com.dealjoy.dealjoy_merchant
---
- runFlow: upload_base_docs.yaml

# Health Permit
- scrollUntilVisible:
    element: "Health Permit"
    direction: DOWN
    timeout: 5000
- tapOn:
    text: "Upload"
    below: "Health Permit"
- runFlow: upload_photo.yaml

# Cosmetology License
- scrollUntilVisible:
    element: "Cosmetology License"
    direction: DOWN
    timeout: 5000
- tapOn:
    text: "Upload"
    below: "Cosmetology License"
- runFlow: upload_photo.yaml

# Massage Therapy License
- scrollUntilVisible:
    element: "Massage Therapy License"
    direction: DOWN
    timeout: 5000
- tapOn:
    text: "Upload"
    below: "Massage Therapy License"
- runFlow: upload_photo.yaml
