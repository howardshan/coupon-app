# TC036: 扫描已使用券码
# 测试步骤：登录 → Scan tab → Enter Code → 输入已使用券码 → Verify
# 预期结果：显示 "already been redeemed" 错误提示
appId: com.dealjoy.dealjoy_merchant

---

# 登录
- runFlow: ../../shared/login.yaml

# 点击底部 Scan tab
- tapOn: "Scan"

# 等待扫码页面加载
- extendedWaitUntil:
    visible: "Scan QR"
    timeout: 10000

# 切换到 Enter Code tab
- tapOn: "Enter Code"

# 输入已使用的券码
- tapOn: "e.g. DJ-XXXXXXXXXXXX"
- inputText: "DJ-USEDCODE00001"

# 隐藏键盘
- hideKeyboard

# 点击 Verify
- tapOn: "Verify"

# 等待错误提示
- extendedWaitUntil:
    visible: "already been redeemed"
    timeout: 10000

# 截图保存错误提示
- takeScreenshot: TC036_scan_used_voucher_error
