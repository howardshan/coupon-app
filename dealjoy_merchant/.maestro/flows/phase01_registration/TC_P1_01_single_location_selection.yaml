# Phase 1 TC01: 注册页 Single Location 选择
# 验证注册流程中 Store Type 步骤的 Single Location 选项
appId: com.dealjoy.dealjoy_merchant
---
- launchApp:
    clearState: true

# Step 0: 创建账号
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 30000
- tapOn: "Register"
- extendedWaitUntil:
    visible: "Create Account"
    timeout: 15000
- tapOn: "Business Email"
- inputText: "test_p1_01@test.com"
- tapOn: "Password"
- inputText: "Test1234!"
- tapOn:
    text: "Confirm Password"
    optional: true
- inputText: "Test1234!"
- hideKeyboard
- tapOn: "Next"

# Step 1: Store Type — 验证两个选项都存在
- extendedWaitUntil:
    visible: "Store Type"
    timeout: 15000
- assertVisible: "Single Location"
- assertVisible: "Multiple Locations"

# 选择 Single Location（默认已选）
- tapOn:
    text: "Single Location"
    retryTapIfNoChange: false
- takeScreenshot: P1_TC01_single_selected
- tapOn: "Next"

# 验证进入 Business Info（无品牌字段）
- extendedWaitUntil:
    visible: "Business Info"
    timeout: 15000
- assertVisible: "Company Name"
- assertNotVisible: "Brand Information"

- takeScreenshot: P1_TC01_business_info_no_brand
