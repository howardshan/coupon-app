# TC002: Google 注册
# 测试步骤：点击 Continue with Google → 选择账号 → 授权
# 预期结果：通过 Google 创建账号，进入 onboarding
# 注意：Google Sign-In 在模拟器上可能受限，此用例标记为 BLOCKED（如不可测）
appId: com.dealjoy.dealjoy_merchant

---

- launchApp:
    clearState: true

# 等待登录页加载
- assertVisible: "Welcome back"

# 点击注册链接
- tapOn: "Register"

# 等待注册页
- extendedWaitUntil:
    visible: "Create Account"
    timeout: 10000

# 检查是否有 Google 登录按钮
- assertVisible:
    text: "Continue with Google"
    optional: true

- takeScreenshot: TC002_google_signup_page

# 注意：Google Sign-In 需要真实 Google 服务，模拟器上通常无法完成
# 此测试仅验证按钮存在和可点击
- tapOn:
    text: "Continue with Google"
    optional: true

- takeScreenshot: TC002_google_signup_result
