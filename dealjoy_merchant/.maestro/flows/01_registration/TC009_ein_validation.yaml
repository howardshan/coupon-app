# TC009: EIN 格式验证
# 测试步骤：注册到 Step 4 → 输入 9 位数字（自动格式化为 XX-XXXXXXX）→ 上传证件 → Next 应通过
# 预期结果：输入 "123456789" 自动变为 "12-3456789" 并通过校验
appId: com.dealjoy.dealjoy_merchant

---

- launchApp:
    clearState: true

# Step 0: Create Account
- assertVisible: "Welcome back"
- tapOn: "Register"
- extendedWaitUntil:
    visible: "Create Account"
    timeout: 10000
- tapOn: "Business Email"
- inputText: "testmerchant_tc009@test.com"
- tapOn: "Password"
- inputText: "Test1234!"
- tapOn:
    text: "Confirm Password"
    optional: true
- inputText: "Test1234!"
- hideKeyboard
- tapOn: "Next"

# Step 1: Store Type
- extendedWaitUntil:
    visible: "Store Type"
    timeout: 10000
- tapOn:
    text: "Single Location.*"
    retryTapIfNoChange: false
- tapOn: "Next"

# Step 2: Business Info
- extendedWaitUntil:
    visible: "Company Name"
    timeout: 10000
- tapOn: "Company Name"
- inputText: "TC009 EIN Test"
- tapOn: "Contact Person Name"
- inputText: "Test Owner"
- tapOn: "Contact Phone"
- inputText: "2145551234"
- hideKeyboard
- tapOn: "Next"

# Step 3: Select Category — 选择 Fun & Games（只需3个基础证件，最少）
- extendedWaitUntil:
    visible: "Select Category"
    timeout: 10000
- tapOn: "Fun & Games"
- tapOn: "Next"

# Step 4: Upload Documents — EIN 验证
- extendedWaitUntil:
    visible: "EIN / Tax ID"
    timeout: 10000

# 输入 9 位数字（应用自动插入 dash，无需手动输入 -）
- tapOn: "EIN / Tax ID"
- inputText: "123456789"
- hideKeyboard

- takeScreenshot: TC009_ein_auto_formatted

# 未满 9 位时 Next 应仍停留在 Step 4（EIN 校验失败）
- tapOn: "EIN / Tax ID"
- eraseText: 30
- inputText: "12345"
- hideKeyboard
- tapOn: "Next"
- extendedWaitUntil:
    visible: "EIN / Tax ID"
    timeout: 5000
- takeScreenshot: TC009_ein_incomplete_rejected

# 输入完整 9 位
- tapOn: "EIN / Tax ID"
- eraseText: 30
- inputText: "123456789"
- hideKeyboard

- takeScreenshot: TC009_ein_correct_format

# 上传3个基础证件（Fun & Games 只需基础证件）
- runFlow: ../../shared/upload_base_docs.yaml

# 点击 Next — 应该通过验证
- tapOn: "Next"

# 验证进入下一步（Store Address）
- extendedWaitUntil:
    visible: "Store Address"
    timeout: 10000

- takeScreenshot: TC009_ein_validation_passed
