# Phase 5 TC01: 员工列表页面
# 功能点 #34: 查看员工列表
appId: com.dealjoy.dealjoy_merchant
---
- launchApp:
    clearState: true

# 登录
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 30000
- tapOn: "Email"
- inputText: "testmerchant@dealjoy.com"
- tapOn: "Password"
- inputText: "Test123456"
- hideKeyboard
- tapOn: "Sign In"

# 进入 Dashboard
- extendedWaitUntil:
    visible: "Today's Stats"
    timeout: 15000

# 导航到 Me → Staff Accounts（点击底部 Me tab）
- tapOn:
    point: "90%,97%"
- extendedWaitUntil:
    visible: "Staff Accounts"
    timeout: 15000
    optional: true
- tapOn:
    text: "Staff Accounts"
    optional: true

- takeScreenshot: P5_TC01_staff_page
