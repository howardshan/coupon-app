appId: com.dealjoy.dealjoy_merchant
name: "TC_P6_01 - Multi-store deal toggle"
---
- runFlow: ../../shared/login.yaml

# 从 Dashboard Quick Actions 进入 Deals
- tapOn: "Deals"
- extendedWaitUntil:
    visible: "My Deals"
    timeout: 15000

# 点击创建 Deal（右下角 FAB）
- tapOn: "Create Deal"

# 验证 Deal 创建页面已打开
- extendedWaitUntil:
    visible: "Create Deal"
    timeout: 10000

- takeScreenshot: P6_TC01_deal_create
