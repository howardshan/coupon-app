# TC066: 动态 Deal 分类管理
# 测试步骤：登录 → 创建 Deal Categories → 验证分类显示
# 类似 TC028，验证分类系统端到端可用
# 预期结果：分类管理功能正常，分类列表正确显示
appId: com.dealjoy.dealjoy_merchant

---

- launchApp:
    clearState: true

# 登录
- runFlow: ../../shared/login.yaml

# 等待 Dashboard 加载
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000

# 导航到 Deal 列表
- tapOn: "Manage Deals"

- extendedWaitUntil:
    visible: "My Deals"
    timeout: 8000

- takeScreenshot: TC066_deals_list

# 点击分类管理按钮
- tapOn:
    id: "Manage Categories"
    optional: true

# 等待分类管理 BottomSheet 弹出
- extendedWaitUntil:
    visible: "Deal Categories"
    timeout: 5000

- takeScreenshot: TC066_categories_sheet

# 验证分类列表可见（可能已有分类数据）
- takeScreenshot: TC066_dynamic_deal_categories_result
