# TC032: Create Cash Voucher Deal
# 测试步骤：创建 Deal type = "Cash Voucher" → 设置 $100 券售价 $95 → 验证创建成功
# 注意：当前 MerchantDeal model 尚未支持 deal_type 字段，此测试可能 BLOCKED
# 预期结果：Cash Voucher 类型 Deal 创建成功，原价 $100 售价 $95
appId: com.dealjoy.dealjoy_merchant

---

- launchApp:
    clearState: true

# 引用共享登录
- runFlow: ../../shared/login.yaml

# 等待 Dashboard 加载完成
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000

# 导航到 Deal 列表
- tapOn: "Manage Deals"
- extendedWaitUntil:
    visible: "My Deals"
    timeout: 8000

# 创建 Deal
- tapOn: "Create Deal"
- extendedWaitUntil:
    visible: "Create Deal"
    timeout: 5000
- takeScreenshot: TC032_create_deal_page

# Step 1: 基本信息
- tapOn: "Deal Title"
- inputText: "Cash Voucher $100"
- hideKeyboard

- tapOn: "Description"
- inputText: "Pay $95 for a $100 cash voucher. Valid for any menu item."
- hideKeyboard

# 尝试选择 Deal Type = Cash Voucher（如果 UI 有此选项）
# 注意：当前版本可能没有 Deal Type 选择器，此步骤可能 BLOCKED
- takeScreenshot: TC032_step1_basic_info

# 进入 Step 2
- tapOn: "Continue"

# Step 2: 价格设置
- extendedWaitUntil:
    visible: "Pricing"
    timeout: 5000

# 注意：对于 Cash Voucher，原价应为 $100（券面值），售价 $95
# 当前实现中原价由菜品选择决定，Cash Voucher 可能需要手动输入
- tapOn: "Deal Price"
- inputText: "95"
- hideKeyboard
- takeScreenshot: TC032_step2_voucher_pricing

# 进入 Step 3
- tapOn: "Continue"

# Step 3: 库存和有效期
- extendedWaitUntil:
    visible: "Stock & Validity"
    timeout: 5000

# 设为 Unlimited 库存
- tapOn: "Unlimited"

# 设置有效期 30 天
- tapOn: "Days After Purchase"
- tapOn:
    text: "Number of days"
    optional: true
- inputText: "30"
- hideKeyboard

# 进入 Step 4
- tapOn: "Continue"

# Step 4: 使用规则（全部默认即可）
- extendedWaitUntil:
    visible: "Usage Rules"
    timeout: 5000
- takeScreenshot: TC032_step4_rules

# 进入 Step 5
- tapOn: "Continue"

# Step 5: 图片上传
- extendedWaitUntil:
    visible: "Images"
    timeout: 5000
- takeScreenshot: TC032_step5_images

# 注意：图片上传在自动化测试中可能 BLOCKED（需要相机/相册权限）
# 尝试点击提交（如果没有图片会提示错误）
- tapOn: "Submit"
- takeScreenshot: TC032_create_voucher_deal_result
