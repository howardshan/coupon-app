# TC028: Deal Categories - Create Categories
# 测试步骤：Deal 列表页 → Manage Categories → 创建 "2-Person Set" 和 "Family Set"
# 预期结果：两个分类创建成功，在分类管理列表中显示
appId: com.dealjoy.dealjoy_merchant

---

- launchApp:
    clearState: true

# 引用共享登录
- runFlow: ../../shared/login.yaml

# 等待 Dashboard 加载完成
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000

# 导航到 Deal 列表
- tapOn: "Manage Deals"
- extendedWaitUntil:
    visible: "My Deals"
    timeout: 8000
- takeScreenshot: TC028_deals_list

# 点击分类管理按钮（AppBar 右上角 category 图标，tooltip = "Manage Categories"）
- tapOn:
    id: "Manage Categories"
    optional: true
- takeScreenshot: TC028_try_tooltip

# 如果 tooltip 不能点击，尝试直接点击图标位置
# 分类管理 BottomSheet 应弹出
- extendedWaitUntil:
    visible: "Deal Categories"
    timeout: 5000
- takeScreenshot: TC028_categories_sheet_open

# 创建第一个分类 "2-Person Set"
# 点击 + 按钮（add_circle_outline 图标）
- tapOn:
    id: "add_circle_outline"
    optional: true

# 等待 New Category 对话框出现
- extendedWaitUntil:
    visible: "New Category"
    timeout: 5000

# 输入分类名称
- tapOn: "Category name"
- inputText: "2-Person Set"
- hideKeyboard
- takeScreenshot: TC028_new_category_dialog_1

# 点击 Add 按钮确认
- tapOn: "Add"

# 等待分类创建完成
- extendedWaitUntil:
    visible: "2-Person Set"
    timeout: 5000
- takeScreenshot: TC028_first_category_created

# 创建第二个分类 "Family Set"
- tapOn:
    id: "add_circle_outline"
    optional: true

- extendedWaitUntil:
    visible: "New Category"
    timeout: 5000

- tapOn: "Category name"
- inputText: "Family Set"
- hideKeyboard
- takeScreenshot: TC028_new_category_dialog_2

- tapOn: "Add"

# 等待分类创建完成
- extendedWaitUntil:
    visible: "Family Set"
    timeout: 5000

# 验证两个分类都存在
- assertVisible: "2-Person Set"
- assertVisible: "Family Set"
- takeScreenshot: TC028_both_categories_created

# 关闭 BottomSheet
- tapOn:
    id: "close"
    optional: true
- takeScreenshot: TC028_deal_categories_create_result
