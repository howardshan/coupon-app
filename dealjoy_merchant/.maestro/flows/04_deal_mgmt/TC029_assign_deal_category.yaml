# TC029: Assign Deal Category
# 测试步骤：编辑已有 Deal → 选择分类 "2-Person Set" → Save → 验证分类已分配
# 前置条件：至少有一个 Deal 且已创建 "2-Person Set" 分类（TC028）
# 预期结果：Deal 编辑后分类字段更新为 "2-Person Set"
appId: com.dealjoy.dealjoy_merchant

---

- launchApp:
    clearState: true

# 引用共享登录
- runFlow: ../../shared/login.yaml

# 等待 Dashboard 加载完成
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000

# 导航到 Deal 列表
- tapOn: "Manage Deals"
- extendedWaitUntil:
    visible: "My Deals"
    timeout: 8000
- takeScreenshot: TC029_deals_list

# 点击第一个 Deal 进入详情
- tapOn:
    index: 0
- extendedWaitUntil:
    visible: "Deal Details"
    timeout: 5000
- takeScreenshot: TC029_deal_detail

# 点击 Edit 按钮
- tapOn: "Edit"
- extendedWaitUntil:
    visible: "Edit Deal"
    timeout: 5000
- takeScreenshot: TC029_edit_deal_page

# 找到 Deal Category 下拉选择器
# Step 1 (Basic Info) 中的分类下拉
- scrollUntilVisible:
    element: "Deal Category"
    direction: DOWN
    timeout: 5000

# 点击 Deal Category 下拉
- tapOn: "Deal Category"
- takeScreenshot: TC029_category_dropdown_open

# 选择 "2-Person Set"
- tapOn: "2-Person Set"
- takeScreenshot: TC029_category_selected

# 滚动到底部提交
- scrollUntilVisible:
    element: "Save"
    direction: DOWN
    timeout: 5000

# 点击 Save 保存
- tapOn: "Save"

# 等待保存完成
- extendedWaitUntil:
    visible: "Deal Details"
    timeout: 10000
- takeScreenshot: TC029_assign_deal_category_result
