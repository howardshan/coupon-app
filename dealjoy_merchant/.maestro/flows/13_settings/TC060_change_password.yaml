# TC060: 修改密码
# 测试步骤：登录 → Me tab → Settings → Change Password → 仅验证页面可达
# 注意：实际修改密码会影响后续测试，仅验证页面可达
# 预期结果：Change Password 页面成功加载
appId: com.dealjoy.dealjoy_merchant

---

# 登录
- runFlow: ../../shared/login.yaml

# 点击底部 Me tab
- tapOn: "Me"

- extendedWaitUntil:
    visible: "Me"
    timeout: 10000

# 点击 Settings 入口
- tapOn: "Settings"

- extendedWaitUntil:
    visible: "Settings"
    timeout: 10000

- takeScreenshot: TC060_settings_page

# 点击 Change Password
- tapOn: "Change Password"

- extendedWaitUntil:
    visible: "Change Password"
    timeout: 8000

- takeScreenshot: TC060_change_password_page

# 仅验证页面可达，不实际修改密码（避免影响后续测试）
- takeScreenshot: TC060_change_password_result
