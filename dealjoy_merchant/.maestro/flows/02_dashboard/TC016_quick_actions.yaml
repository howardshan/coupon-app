# TC016: Dashboard Quick Actions
# 测试步骤：登录后查看 Dashboard → 验证快捷操作按钮 → 分别点击每个按钮验证跳转 → 返回
# 预期结果：Scan, Manage Deals, Orders, Reviews 按钮可见且点击后能正确跳转到对应页面
appId: com.dealjoy.dealjoy_merchant

---

- launchApp:
    clearState: true

# 引用共享登录
- runFlow: ../../shared/login.yaml

# 等待 Dashboard 加载完成
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000

# 验证快捷操作按钮可见
- assertVisible: "Scan"
- assertVisible: "Manage Deals"
- assertVisible: "Orders"
- assertVisible: "Reviews"
- takeScreenshot: TC016_quick_actions_overview

# 点击 Scan 按钮 → 验证跳转 → 返回
- tapOn: "Scan"
- extendedWaitUntil:
    visible: "Scan"
    timeout: 5000
- takeScreenshot: TC016_scan_page
- pressKey: back

# 等待返回 Dashboard
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 5000

# 点击 Manage Deals → 验证跳转 → 返回
- tapOn: "Manage Deals"
- extendedWaitUntil:
    visible: "Deals"
    timeout: 5000
- takeScreenshot: TC016_deals_page
- pressKey: back

- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 5000

# 点击 Orders → 验证跳转 → 返回
- tapOn: "Orders"
- extendedWaitUntil:
    visible: "Orders"
    timeout: 5000
- takeScreenshot: TC016_orders_page
- pressKey: back

- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 5000

# 点击 Reviews → 验证跳转 → 返回
- tapOn: "Reviews"
- extendedWaitUntil:
    visible: "Reviews"
    timeout: 5000
- takeScreenshot: TC016_reviews_page
- pressKey: back

- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 5000

# 最终截图
- takeScreenshot: TC016_quick_actions_result
