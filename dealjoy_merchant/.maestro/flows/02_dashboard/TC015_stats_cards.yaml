# TC015: Dashboard Stats Cards
# 测试步骤：登录已审核通过的商家账号 → 进入 Dashboard → 验证4个统计卡片可见
# 预期结果：Dashboard 显示 Today Orders, Today Revenue, Pending Scans, Rating 四个统计卡片
appId: com.dealjoy.dealjoy_merchant

---

- launchApp:
    clearState: true

# 引用共享登录
- runFlow: ../../shared/login.yaml

# 等待 Dashboard 加载完成
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000

# 验证页面标题
- assertVisible: "Dashboard"

# 验证4个统计卡片
- assertVisible: "Today Orders"
- assertVisible: "Today Revenue"
- assertVisible: "Pending Scans"
- assertVisible: "Rating"

# 截图记录结果
- takeScreenshot: TC015_stats_cards_result
