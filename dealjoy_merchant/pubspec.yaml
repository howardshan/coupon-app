name: dealjoy_merchant
description: "DealJoy Merchant — 商家端 App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 导航
  go_router: ^14.3.0

  # 后端 - Supabase
  supabase_flutter: ^2.8.0

  # 扫码
  mobile_scanner: ^6.0.3

  # 图片
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  cached_network_image: ^3.4.1

  # 本地存储
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # 工具
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.13
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - .env
