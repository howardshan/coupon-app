name: dealjoy_merchant
description: "Crunchy Plum Merchant — 商家端 App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 导航
  go_router: ^14.3.0

  # 后端 - Supabase
  supabase_flutter: ^2.8.0

  # 合规审计：采集设备信息和 App 版本号，写入法律文档同意事件
  device_info_plus: ^11.1.0
  package_info_plus: ^8.0.2

  # 扫码（7.x：iOS Vision，支持 Apple Silicon 模拟器 arm64）
  mobile_scanner: ^7.2.0

  # 图片 / 售后证据（含 PDF）
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  image_cropper: ^8.0.2
  cached_network_image: ^3.4.1

  # 本地存储
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # 工具
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.1
  flutter_stripe: ^11.1.0

  # Auth：iOS 原生 Sign in with Apple → Supabase signInWithIdToken
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

  http: ^1.6.0
  cupertino_icons: ^1.0.8
  geocoding: ^4.0.0

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.13
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - .env
