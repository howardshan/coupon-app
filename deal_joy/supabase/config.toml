# Edge Functions 配置
# 详见 https://supabase.com/docs/guides/functions/function-configuration

# merchant-orders：关闭网关 JWT 校验，由函数内 getClaims(body.access_token) 自行鉴权，
# 避免网关消费 body 导致函数收不到 access_token 而 401
[functions.merchant-orders]
verify_jwt = false

# user-order-detail：同上，从 body 传 access_token，函数内自行鉴权
[functions.user-order-detail]
verify_jwt = false

# submit-refund-dispute：用户 JWT 由网关校验 + 函数内 getUser 双保险
[functions.submit-refund-dispute]
verify_jwt = true
